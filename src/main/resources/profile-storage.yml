#########################################################################
# Loại cơ sở dữ liệu, có thể chọn SQLITE, MYSQL, POSTGRESQL
# Lưu ý: Khi chuyển loại cơ sở dữ liệu, chúng tôi sẽ không tự động di chuyển dữ liệu cho bạn :)
# Lưu ý: Khi dùng MYSQL đa server, nhất định phải đặt allow-open-when-owner-offline trong config.yml thành false
#      để tránh người chơi mở cùng một ba lô trên các server khác nhau để nhân vật phẩm.
storageType: SQLITE

# Mã hóa Base64 cho trường dữ liệu
base64EncodeVal: true
#########################################################################

#########################################################################
# Số luồng đọc ghi cơ sở dữ liệu
# Khi dùng MYSQL, nên đặt số kết nối tối đa = số luồng đọc + ghi, và số luồng đọc nên lớn hơn luồng ghi.
# Lưu ý: Số luồng không phải càng nhiều càng tốt, quá nhiều có thể làm giảm hiệu suất. Hãy phân bổ số lượng phù hợp.

# Số luồng đọc
readExecutorThread: 7
# Số luồng ghi
writeExecutorThread: 3
#########################################################################

#########################################################################
# Cấu hình Sqlite
sqlite:
  maxConnection: 5
#########################################################################

#########################################################################
# Cấu hình MySQL
mysql:
  # Địa chỉ kết nối cơ sở dữ liệu
  host: "127.0.0.1"
  # Cổng kết nối cơ sở dữ liệu
  port: 3306
  # Tên cơ sở dữ liệu
  database: ""
  # Tiền tố bảng
  tablePrefix: ""
  # Tên người dùng kết nối
  user: ""
  # Mật khẩu người dùng kết nối
  password: ""
  # Có sử dụng kết nối mã hóa không
  useSSL: false
  # Số kết nối tối đa
  maxConnection: 10
#########################################################################

#########################################################################
# Cấu hình PostgreSQL
postgresql:
  # Địa chỉ kết nối cơ sở dữ liệu
  host: "127.0.0.1"
  # Cổng kết nối cơ sở dữ liệu
  port: 3306
  # Tên cơ sở dữ liệu
  database: ""
  # Tiền tố bảng
  tablePrefix: ""
  # Tên người dùng kết nối
  user: ""
  # Mật khẩu người dùng kết nối
  password: ""
  # Có sử dụng kết nối mã hóa không
  useSSL: false
  # Số kết nối tối đa
  maxConnection: 10
#########################################################################