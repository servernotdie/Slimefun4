#########################################################################
# Loại cơ sở dữ liệu, có thể chọn SQLITE, MYSQL, POSTGRESQL
# Lưu ý: Khi chuyển loại cơ sở dữ liệu, chúng tôi sẽ không tự động di chuyển dữ liệu cho bạn :)
storageType: SQLITE

# Mã hóa Base64 cho trường dữ liệu
base64EncodeVal: true

# Chế độ tải dữ liệu chunk
# Có thể chọn:
# - LOAD_WITH_CHUNK: Tải dữ liệu chunk Slimefun khi chunk được tải lần đầu trong phiên server này
# - LOAD_ON_STARTUP: Tải tất cả dữ liệu chunk một lần khi khởi động server, có thể làm tăng thời gian khởi động
# Mặc định khuyên dùng LOAD_WITH_CHUNK để tiết kiệm bộ nhớ không cần thiết
# Nếu phát hiện lag rõ rệt khi tải chunk, hãy đổi sang LOAD_ON_STARTUP
dataLoadMode: LOAD_WITH_CHUNK
#########################################################################

#########################################################################
# Số luồng đọc ghi cơ sở dữ liệu
# Khi dùng MySQL, nên đặt số kết nối tối đa = số luồng đọc + ghi, và số luồng đọc nên lớn hơn luồng ghi.
# Lưu ý: Số luồng không phải càng nhiều càng tốt, quá nhiều có thể làm giảm hiệu suất. Hãy phân bổ số lượng phù hợp.

# Số luồng đọc
readExecutorThread: 10
# Số luồng ghi
writeExecutorThread: 5
#########################################################################

#########################################################################
# Tính năng ghi trì hoãn
# Tính năng này ngăn dữ liệu bị ghi liên tục gây ra nhiều yêu cầu ghi vô nghĩa trong hàng đợi.
# Khi bật, sau khi dữ liệu thay đổi sẽ đợi (delayedSecond) giây, nếu không có thay đổi khác mới ghi vào cơ sở dữ liệu.
# Khi lưu cưỡng chế sẽ đưa dữ liệu đang đợi trực tiếp vào hàng đợi ghi.
delayedWriting:
  # Có bật ghi trì hoãn không
  enable: true
  # Số giây trì hoãn ghi
  delayedSecond: 5
  # Khoảng thời gian lưu cưỡng chế (đơn vị: giây)
  forceSavePeriod: 300
#########################################################################

#########################################################################
# Cấu hình Sqlite
sqlite:
  maxConnection: 5
#########################################################################

#########################################################################
# Cấu hình MySQL
mysql:
  # Địa chỉ kết nối cơ sở dữ liệu
  host: "127.0.0.1"
  # Cổng kết nối cơ sở dữ liệu
  port: 3306
  # Tên cơ sở dữ liệu
  database: ""
  # Tiền tố bảng
  tablePrefix: ""
  # Tên người dùng kết nối
  user: ""
  # Mật khẩu người dùng kết nối
  password: ""
  # Có sử dụng kết nối mã hóa không
  useSSL: false
  # Số kết nối tối đa
  maxConnection: 15
#########################################################################

#########################################################################
# Cấu hình PostgreSQL
postgresql:
  # Địa chỉ kết nối cơ sở dữ liệu
  host: "127.0.0.1"
  # Cổng kết nối cơ sở dữ liệu
  port: 3306
  # Tên cơ sở dữ liệu
  database: ""
  # Tiền tố bảng
  tablePrefix: ""
  # Tên người dùng kết nối
  user: ""
  # Mật khẩu người dùng kết nối
  password: ""
  # Có sử dụng kết nối mã hóa không
  useSSL: false
  # Số kết nối tối đa
  maxConnection: 15
#########################################################################