# options:
#    auto-update - Tự động kiểm tra và cập nhật phiên bản mới từ Github
#    armor-update-interval - Chu kỳ cập nhật hiệu ứng áo giáp Slimefun
#    enable-armor-effects - Bật/tắt hiệu ứng áo giáp
#    chat-prefix - Tiền tố cho tất cả tin nhắn của Slimefun
#    auto-save-delay-in-minutes - Chu kỳ tự động lưu dữ liệu, đơn vị phút
#    legacy-ore-washer - Có sử dụng cơ chế máy rửa quặng cũ không
#    legacy-dust-washer - Có sử dụng cơ chế máy loại bỏ bụi cũ không
#    legacy-ore-grinder - Có sử dụng cơ chế máy nghiền quặng cũ không
#    language - Ngôn ngữ văn bản Slimefun (không bao gồm vật phẩm)
#    enable-translations - Chức năng đa ngôn ngữ
#    backwards-compatibility - Chế độ tương thích ngược vật phẩm, tắt để dùng hệ thống vật phẩm mới
#                             Sẽ cải thiện hiệu suất
#    log-duplicate-block-entries - Có xuất cảnh báo khi phát hiện khối trùng lặp không
#    burn-players-when-radioactive - Có đốt người chơi khi họ bị phơi nhiễm phóng xạ không
#    drop-excess-sf-give-items - Có rơi vật phẩm thừa khi dùng lệnh tặng vật phẩm Slimefun khi túi đầy không
#    backup-data - Tự động sao lưu dữ liệu
#    bypass-environment-check - Bỏ qua kiểm tra tương thích (Lưu ý: Bật sẽ không được hỗ trợ phản hồi vấn đề)
options:
  auto-update: true
  chat-prefix: '&a&lSlimefun 4 &7> '
  armor-update-interval: 10
  enable-armor-effects: true
  enable-radiation: true
  radiation-update-interval: 1
  radiation-grace-period: 15
  rainbow-armor-update-interval: 3
  auto-save-delay-in-minutes: 10
  legacy-ore-washer: false
  legacy-dust-washer: false
  legacy-ore-grinder: true
  language: vi
  enable-translations: true
  log-duplicate-block-entries: true
  burn-players-when-radioactive: true
  drop-excess-sf-give-items: false
  backup-data: true
  drop-block-creative: true
  bypass-environment-check: false
  bypass-item-length-check: false
  max-gps-waypoints: 21

guide:
  # Có hiển thị công thức chế tạo vật phẩm vanilla trong hướng dẫn không
  show-vanilla-recipes: true
  # Có tự động tặng sách hướng dẫn Slimefun khi người chơi vào server lần đầu không
  receive-on-first-join: true
  # Có hiển thị nhóm vật phẩm ẩn trong tìm kiếm không
  show-hidden-item-groups-in-search: false

researches:
  # Có cho phép người chơi chế độ sáng tạo mở khóa nghiên cứu miễn phí không
  free-in-creative-mode: true
  # Có bắn pháo hoa khi mở khóa không
  enable-fireworks: true
  # Có dùng tiền tệ thay vì kinh nghiệm để mở khóa không
  use-money-unlock: false
  # Tỷ lệ chuyển đổi tự động từ kinh nghiệm sang tiền tệ
  currency-cost-convert-rate: 25.0
  # Có tắt hiệu ứng mở khóa nghiên cứu không
  disable-learning-animation: false

URID:
  info-delay: 3000
  custom-ticker-delay: 10
  enable-tickers: true

networks:
  max-size: 200
  cargo-ticker-delay: 0
  enable-visualizer: true
  delete-excess-items: false

talismans:
  use-actionbar: true

metrics:
  auto-update: false

backpack:
  # Có cho phép mở ba lô khi chủ nhân offline không
  allow-open-when-owner-offline: true

