# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Slimefun DEV

on:
  push:
    branches:
      - dev
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
          java-package: jdk
          architecture: x64
          cache: maven
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: "first build: download depends file"
        run: |
          rm -rf ~/.m2/repository/io/github/baked-libs/
          mvn package
          echo "PATH_DIR=$PWD" >> $GITHUB_ENV
      - name: download dough api
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: maven.yml
          workflow_conclusion: success
          repo: Craft233MC/dough
          use_unzip: true
      - name: replace dough
        run: |
          cd ${{ env.PATH_DIR }}
          export NEW=$(ls | grep dough)
          cp ${NEW}/${NEW} ~/.m2/repository/io/github/baked-libs/dough/dough-api/*/
          
          cd ~/.m2/repository/io/github/baked-libs/dough/dough-api/
          export OLD=$(ls)
          cd ${OLD}
          rm -rf dough-api-${OLD}}.jar dough-api-${OLD}.jar.sha1

          echo $(sha1sum ${NEW}) >> dough-api-${OLD}.jar.sha1
          mv ${NEW} ./dough-api-${OLD}.jar
      - name: Build SlimeFun
        run: mvn clean package
      - name: select SlimeFun.jar
        run: |
          cd target
          rm -rf original*
          echo "FILE=$(ls | grep jar)" >> $GITHUB_ENV
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE }}
          path: target/${{ env.FILE }}
