# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Slimefun DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: 21
          java-package: jdk
          architecture: x64
          cache: maven
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: "first build: download depends file"
        run: |
          rm -rf ~/.m2/repository/com/github/StarWishsama/
          mvn package
          echo "PATH_DIR=$PWD" >> $GITHUB_ENV
      - name: download dough api
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: maven.yml
          workflow_conclusion: success
          repo: Craft233MC/dough
          use_unzip: true
      - name: replace dough
        run: |
          cd ${{ env.PATH_DIR }} && ls
          echo "new_dough_file=$(ls | grep dough-api)" >> $GITHUB_ENV
          cp ${{ env.new_dough_file}}/${{ env.new_dough_file}} ~/.m2/repository/com/github/StarWishsama/dough/dough-api/
          
          cd ~/.m2/repository/com/github/StarWishsama/dough/dough-api/
          echo "old_dough_ver=$(ls)" >> $GITHUB_ENV
          cd ${{ env.old_dough_ver }}
          rm -rf dough-api-${{ env.old_dough_ver }}.jar dough-api-${{ env.old_dough_ver }}.jar.sha1

          echo $(sha1sum ${{ env.new_dough_file}}) >> dough-api-${{ env.old_dough_ver }}.jar.sha1
          mv ../${{ env.new_dough_file}} ./dough-api-${{ env.old_dough_ver }}.jar
      - name: Build SlimeFun
        run: mvn clean package
      - name: select SlimeFun.jar
        run: |
          rm -rf original*
          echo "FILE=$(ls | grep jar)" >> $GITHUB_ENV
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE }}
          path: target/${{ env.FILE }}
